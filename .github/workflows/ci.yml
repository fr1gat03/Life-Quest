name: Life Quest CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Check Code Formatting
        run: dotnet format src/LifeQuest.sln --verify-no-changes
        continue-on-error: true
      
      - name: Restore dependencies
        run: dotnet restore src/LifeQuest.sln
      
      - name: Build project
        run: dotnet build src/LifeQuest.sln --configuration Release --no-restore
      
      - name: Run automated tests
        run: dotnet test src/LifeQuest.sln --configuration Release --no-build --verbosity normal
      
      - name: Publish Windows App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish src/LifeQuest.Presentation/LifeQuest.Presentation.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish_output
      
      - name: Upload App Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: LifeQuest-Windows-Build
          path: ./publish_output/